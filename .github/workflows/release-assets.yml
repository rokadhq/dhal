name: Build Dhal release assets

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run verify:v1

      - name: Generate package, SBOM, and checksums
        run: npm run release:assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhal-${{ github.event.release.tag_name || github.ref_name }}-release-assets
          path: release-assets
          if-no-files-found: error

      - name: Attach assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" release-assets/* --clobber
