name: Build Dhal release assets

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-assets.yml

concurrency:
  group: dhal-v1-release-assets
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run verify:v1

      - name: Generate package, SBOM, and checksums
        run: npm run release:assets

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="v$VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const version = process.env.VERSION;
          const lines = readFileSync("CHANGELOG.md", "utf8").split(/\r?\n/);
          const header = `## ${version}`;
          const start = lines.findIndex((line) => line === header || line.startsWith(`${header} `));

          if (start !== -1) {
            let end = lines.length;
            for (let index = start + 1; index < lines.length; index += 1) {
              if (lines[index].startsWith("## ")) {
                end = index;
                break;
              }
            }

            const notes = lines.slice(start + 1, end).join("\n").trim();
            if (notes) writeFileSync("release-notes.md", `${notes}\n`);
          }
          NODE

          if [ ! -s release-notes.md ]; then
            cat > release-notes.md <<EOF
          Dhal $VERSION is a stable release of the app-native WAF for Node.js.

          See CHANGELOG.md for the complete list of changes included in this version.
          EOF
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Dhal v$VERSION" --notes-file release-notes.md --latest
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "Dhal v$VERSION" \
              --notes-file release-notes.md \
              --latest
          fi

      - name: Attach release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "$TAG" release-assets/* --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhal-${{ steps.release.outputs.tag }}-release-assets
          path: release-assets
          if-no-files-found: error

      - name: Record verified GitHub release
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          git checkout main
          git pull --rebase origin main
          mkdir -p .release-status
          STATUS_FILE=".release-status/v${VERSION}-github.json"
          cat > "$STATUS_FILE" <<EOF
          {
            "repository": "rokadhq/dhal",
            "tag": "${{ steps.release.outputs.tag }}",
            "version": "${{ steps.release.outputs.version }}",
            "releaseType": "stable",
            "assets": [
              "rokadhq-dhal-${{ steps.release.outputs.version }}.tgz",
              "dhal-sbom.cdx.json",
              "SHA256SUMS",
              "dhal-release-manifest.json"
            ],
            "verifiedBy": "${{ github.workflow }}",
            "workflowRun": "${{ github.run_id }}",
            "sourceCommit": "${{ github.sha }}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$STATUS_FILE"
          git commit -m "release: record verified GitHub release for v${VERSION}" || exit 0
          git push origin HEAD:main
