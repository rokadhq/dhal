name: Dhal v1 Release Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-contract:
    name: Package contract / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        id: typecheck
        shell: bash
        run: npm run typecheck > typecheck.log 2>&1
      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-node-${{ matrix.node }}
          path: typecheck.log
      - name: Unit and integration tests
        run: npm test
      - name: Build ESM, CommonJS, and declarations
        run: npm run build
      - name: Generate configuration schema
        run: npm run schema
      - name: Verify package export targets
        run: npm run verify:exports
      - name: Validate Dhal configuration policy
        run: npm run ci:config
      - name: Run request simulation
        run: npm run simulate
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Verify packed ESM, CommonJS, and TypeScript consumers
        run: npm run verify:packed
      - name: Verify development release contract
        run: npm run release:check

  framework-matrix:
    name: Express ${{ matrix.express }} / Fastify ${{ matrix.fastify }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        express: ["4", "5"]
        fastify: ["4", "5"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install framework matrix
        run: npm install --no-save --ignore-scripts express@${{ matrix.express }} fastify@${{ matrix.fastify }}
      - run: npx vitest run tests/adapters.integration.test.ts

  distributed-stores:
    name: Distributed stores / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Redis 7
            image: redis:7-alpine
          - name: Valkey 8
            image: valkey/valkey:8-alpine
    services:
      datastore:
        image: ${{ matrix.image }}
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run tests/redis.integration.test.ts
        env:
          DHAL_REDIS_URL: redis://127.0.0.1:6379

  performance-budget:
    name: Performance and memory budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify:performance
