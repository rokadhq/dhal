name: Sync v0.13 generated package output

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-v013-dist.yml"

permissions:
  contents: write

jobs:
  sync-dist:
    if: github.event.head_commit.message != 'chore: remove temporary dist sync workflow'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and regenerate package output
        run: npm run verify:publish

      - name: Commit generated package output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          git add dhal.schema.json
          if git diff --cached --quiet; then
            echo "Generated output is already synchronized."
            exit 0
          fi
          git commit -m "chore: sync v0.13 generated package output"
          git push origin HEAD:main
