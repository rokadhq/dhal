name: Publish Dhal to npm

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - .github/workflows/publish.yml

concurrency:
  group: dhal-npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify stable package
        run: npm run verify:v1

      - name: Resolve npm version and dist-tag
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *"-alpha."* ]]; then
            TAG=alpha
          elif [[ "$VERSION" == *"-beta."* ]]; then
            TAG=beta
          elif [[ "$VERSION" == *"-rc."* ]]; then
            TAG=rc
          elif [[ "$VERSION" == 0.* ]]; then
            TAG=next
          else
            TAG=latest
          fi

          if npm view "@rokadhq/dhal@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            SHOULD_PUBLISH=false
          else
            SHOULD_PUBLISH=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.release.outputs.should_publish == 'true'
        run: npm publish --access public --tag ${{ steps.release.outputs.tag }}

      - name: Confirm published package
        id: confirm
        shell: bash
        run: |
          for attempt in {1..18}; do
            PUBLISHED="$(npm view "@rokadhq/dhal@${{ steps.release.outputs.version }}" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)"
            LATEST="$(npm view "@rokadhq/dhal" dist-tags.latest --registry=https://registry.npmjs.org/ 2>/dev/null || true)"
            if [ "$PUBLISHED" = "${{ steps.release.outputs.version }}" ] && [ "$LATEST" = "${{ steps.release.outputs.version }}" ]; then
              echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
              echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 5
          done
          echo "Stable version or latest dist-tag was not visible in the npm registry." >&2
          exit 1

      - name: Record verified npm publication
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          mkdir -p .release-status
          STATUS_FILE=".release-status/v${VERSION}-npm.json"
          cat > "$STATUS_FILE" <<EOF
          {
            "package": "@rokadhq/dhal",
            "version": "${{ steps.confirm.outputs.published }}",
            "distTag": "latest",
            "verifiedBy": "${{ github.workflow }}",
            "workflowRun": "${{ github.run_id }}",
            "sourceCommit": "${{ github.sha }}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$STATUS_FILE"
          git commit -m "release: record verified npm publication for v${VERSION}" || exit 0
          git push origin HEAD:main
