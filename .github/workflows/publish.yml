name: Publish Dhal to npm

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - .github/workflows/publish.yml

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify stable package
        run: npm run verify:v1

      - name: Resolve npm version and dist-tag
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *"-alpha."* ]]; then
            TAG=alpha
          elif [[ "$VERSION" == *"-beta."* ]]; then
            TAG=beta
          elif [[ "$VERSION" == *"-rc."* ]]; then
            TAG=rc
          elif [[ "$VERSION" == 0.* ]]; then
            TAG=next
          else
            TAG=latest
          fi

          if npm view "@rokadhq/dhal@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            SHOULD_PUBLISH=false
          else
            SHOULD_PUBLISH=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.release.outputs.should_publish == 'true'
        run: npm publish --access public --tag ${{ steps.release.outputs.tag }}

      - name: Confirm published package
        if: steps.release.outputs.should_publish == 'true'
        shell: bash
        run: |
          for attempt in {1..12}; do
            PUBLISHED="$(npm view "@rokadhq/dhal@${{ steps.release.outputs.version }}" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)"
            if [ "$PUBLISHED" = "${{ steps.release.outputs.version }}" ]; then
              echo "Confirmed @rokadhq/dhal@$PUBLISHED"
              exit 0
            fi
            sleep 5
          done
          echo "Published version was not visible in the npm registry within the verification window." >&2
          exit 1

      - name: Package already published
        if: steps.release.outputs.should_publish != 'true'
        run: echo "@rokadhq/dhal@${{ steps.release.outputs.version }} already exists; skipping publication."
